<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestão de Projetos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .login-body {
            padding: 40px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input::placeholder {
            color: #999;
        }

        .button-group {
            margin-top: 30px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .demo-info {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #0c5aa0;
        }

        .demo-info strong {
            display: block;
            margin-bottom: 8px;
        }

        .demo-user {
            background: white;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-family: monospace;
        }

        .demo-user span {
            display: inline-block;
            min-width: 70px;
        }

        .footer-text {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .login-body {
                padding: 25px;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🎭 Gestão de Projetos</h1>
            <p>Sistema de Controle de Projetos Culturais</p>
        </div>

        <div class="login-body">
            <!-- TABS -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchLoginTab('login')">🔓 Login</button>
                <button class="tab-btn" onclick="switchLoginTab('register')">📝 Registrar</button>
            </div>

            <!-- ABA LOGIN -->
            <div id="loginTab" class="tab-content active">
                <div class="demo-info">
                    <strong>👥 Usuários de Demonstração:</strong>
                    <div class="demo-user"><span>user1</span> / senha123</div>
                    <div class="demo-user"><span>user2</span> / senha456</div>
                    <div class="demo-user"><span>user3</span> / senha789</div>
                </div>

                <div id="loginMessage" class="message"></div>

                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="loginUsername" placeholder="Digite seu usuário" autocomplete="username">
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="loginPassword" placeholder="Digite sua senha" autocomplete="current-password">
                </div>

                <div class="button-group">
                    <button class="btn btn-submit" onclick="handleLogin()">Entrar</button>
                </div>

                <div class="footer-text">
                    💡 Dica: Use um dos usuários acima para testar
                </div>
            </div>

            <!-- ABA REGISTRAR -->
            <div id="registerTab" class="tab-content">
                <div id="registerMessage" class="message"></div>

                <div class="form-group">
                    <label>Nome de Usuário</label>
                    <input type="text" id="registerUsername" placeholder="Escolha um nome de usuário" autocomplete="username">
                </div>

                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="registerEmail" placeholder="seu@email.com" autocomplete="email">
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="registerPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label>Confirmar Senha</label>
                    <input type="password" id="registerPassword2" placeholder="Confirme a senha" autocomplete="new-password">
                </div>

                <div class="button-group">
                    <button class="btn btn-submit" onclick="handleRegister()">Criar Conta</button>
                </div>

                <div class="footer-text">
                    ✅ Após registrar, use suas credenciais para fazer login
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        function switchLoginTab(tabName) {
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('registerTab').classList.remove('active');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            if (tabName === 'login') {
                document.getElementById('loginTab').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else {
                document.getElementById('registerTab').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
            }
        }

        function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const messageDiv = document.getElementById('loginMessage');

            if (!username || !password) {
                showMessage(messageDiv, 'Por favor, preencha todos os campos', 'error');
                return;
            }

            const result = auth.login(username, password);

            if (result.success) {
                showMessage(messageDiv, '✅ ' + result.message, 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                showMessage(messageDiv, '❌ ' + result.message, 'error');
            }
        }

        function handleRegister() {
            const username = document.getElementById('registerUsername').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const password2 = document.getElementById('registerPassword2').value;
            const messageDiv = document.getElementById('registerMessage');

            if (!username || !email || !password || !password2) {
                showMessage(messageDiv, 'Por favor, preencha todos os campos', 'error');
                return;
            }

            if (password !== password2) {
                showMessage(messageDiv, 'As senhas não coincidem', 'error');
                return;
            }

            const result = auth.register(username, password, email);

            if (result.success) {
                showMessage(messageDiv, '✅ ' + result.message + '. Você pode fazer login agora!', 'success');
                document.getElementById('registerUsername').value = '';
                document.getElementById('registerEmail').value = '';
                document.getElementById('registerPassword').value = '';
                document.getElementById('registerPassword2').value = '';

                setTimeout(() => {
                    switchLoginTab('login');
                    document.getElementById('loginUsername').focus();
                }, 2000);
            } else {
                showMessage(messageDiv, '❌ ' + result.message, 'error');
            }
        }

        function showMessage(element, message, type) {
            element.textContent = message;
            element.className = 'message ' + type;
            element.style.display = 'block';
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginPassword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin();
            });

            document.getElementById('registerPassword2').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleRegister();
            });

            if (auth.isLoggedIn()) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
