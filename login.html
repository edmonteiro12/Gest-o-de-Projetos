<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestão de Projetos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; width: 100%; max-width: 450px; }
        .login-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; text-align: center; }
        .login-header h1 { font-size: 28px; margin-bottom: 10px; }
        .login-header p { font-size: 14px; opacity: 0.9; }
        .login-body { padding: 40px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .message { padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .warning-info { background: #fff3cd; border-left: 4px solid #ffc107; padding: 12px; border-radius: 5px; margin-bottom: 20px; font-size: 13px; color: #856404; }
        @media (max-width: 480px) { .login-body { padding: 25px; } .login-header h1 { font-size: 24px; } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🎭 Gestão de Projetos</h1>
            <p>Sistema de Controle de Projetos Culturais</p>
        </div>
        <div class="login-body">
            <div class="warning-info">⚠️ <strong>Importante:</strong> Seu acesso é gerenciado pelo administrador. Entre em contato para obter suas credenciais.</div>
            <div id="loginMessage" class="message"></div>
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="loginUsername" placeholder="Digite seu usuário" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="loginPassword" placeholder="Digite sua senha" autocomplete="current-password">
            </div>
            <button class="btn" onclick="handleLogin()">Entrar</button>
        </div>
    </div>

    <script>
        // ==================== SISTEMA DE AUTENTICAÇÃO ====================
        const auth = {
            login: function(username, password) {
                // Verificar em usuários normais
                let users = JSON.parse(localStorage.getItem('users') || '[]');
                let user = users.find(u => u.login === username && u.senha === password);
                
                if (user) {
                    if (user.status === 'bloqueado') {
                        return { success: false, message: 'Usuário bloqueado. Contate o administrador.' };
                    }
                    if (!user.acessoIlimitado && user.dataExpiracao) {
                        if (new Date() > new Date(user.dataExpiracao)) {
                            user.status = 'expirado';
                            localStorage.setItem('users', JSON.stringify(users));
                            return { success: false, message: 'Acesso expirado. Contate o administrador.' };
                        }
                    }
                    sessionStorage.setItem('currentUser', JSON.stringify({ login: user.login, nome: user.nome, tipo: user.tipo || 'normal' }));
                    return { success: true, message: 'Login realizado com sucesso!' };
                }
                
                // Verificar em usuários demo
                let demoUsers = JSON.parse(localStorage.getItem('demoUsers') || '[]');
                let demoUser = demoUsers.find(u => u.login === username && u.senha === password);
                
                if (demoUser) {
                    if (demoUser.status === 'bloqueado') {
                        return { success: false, message: 'Usuário demo bloqueado.' };
                    }
                    if (!demoUser.acessoIlimitado && demoUser.dataExpiracao) {
                        if (new Date() > new Date(demoUser.dataExpiracao)) {
                            demoUser.status = 'expirado';
                            localStorage.setItem('demoUsers', JSON.stringify(demoUsers));
                            return { success: false, message: 'Acesso demo expirado.' };
                        }
                    }
                    sessionStorage.setItem('currentUser', JSON.stringify({ login: demoUser.login, nome: 'Usuário Demo', tipo: 'demo' }));
                    return { success: true, message: 'Login demo realizado com sucesso!' };
                }
                
                return { success: false, message: 'Usuário ou senha inválidos!' };
            },
            
            isLoggedIn: function() {
                return sessionStorage.getItem('currentUser') !== null;
            },
            
            logout: function() {
                sessionStorage.removeItem('currentUser');
            }
        };

        // ==================== FUNÇÕES DA PÁGINA ====================
        let redirecting = false;

        function handleLogin() {
            if (redirecting) return;
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const messageDiv = document.getElementById('loginMessage');

            if (!username || !password) {
                showMessage(messageDiv, 'Por favor, preencha todos os campos', 'error');
                return;
            }

            const result = auth.login(username, password);

            if (result.success) {
                redirecting = true;
                showMessage(messageDiv, '✅ ' + result.message, 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                showMessage(messageDiv, '❌ ' + result.message, 'error');
            }
        }

        function showMessage(element, message, type) {
            element.textContent = message;
            element.className = 'message ' + type;
            element.style.display = 'block';
            setTimeout(() => {
                element.style.display = 'none';
            }, 3000);
        }

        // ==================== INICIALIZAÇÃO ====================
        document.addEventListener('DOMContentLoaded', () => {
            const passwordInput = document.getElementById('loginPassword');
            if (passwordInput) {
                passwordInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') handleLogin();
                });
            }
            
            // Limpar sessão anterior
            sessionStorage.removeItem('currentUser');
            
            // Redirecionar se já está logado
            if (auth.isLoggedIn()) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
