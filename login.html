<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestão de Projetos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .login-body {
            padding: 40px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input::placeholder {
            color: #999;
        }

        .button-group {
            margin-top: 30px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .footer-text {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }

        .warning-info {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #856404;
        }

        @media (max-width: 480px) {
            .login-body {
                padding: 25px;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🎭 Gestão de Projetos</h1>
            <p>Sistema de Controle de Projetos Culturais</p>
        </div>

        <div class="login-body">
            <!-- TABS -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchLoginTab('login')">🔓 Login</button>
            </div>

            <!-- ABA LOGIN -->
            <div id="loginTab" class="tab-content active">
                <div class="warning-info">
                    ⚠️ <strong>Importante:</strong> Se seu acesso expirou, entre em contato com o administrador para renovar seu acesso.
                </div>

                <div id="loginMessage" class="message"></div>

                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="loginUsername" placeholder="Digite seu usuário" autocomplete="username">
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="loginPassword" placeholder="Digite sua senha" autocomplete="current-password">
                </div>

                <div class="button-group">
                    <button class="btn btn-submit" onclick="handleLogin()">Entrar</button>
                </div>

                <div class="footer-text">
                    💡 Para acessar o sistema, entre em contato com o administrador
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        function switchLoginTab(tabName) {
            document.getElementById('loginTab').classList.remove('active');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            document.getElementById('loginTab').classList.add('active');
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
        }

        function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const messageDiv = document.getElementById('loginMessage');

            if (!username || !password) {
                showMessage(messageDiv, 'Por favor, preencha todos os campos', 'error');
                return;
            }

            // Verificar usuários normais cadastrados no admin.html
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.login === username && u.senha === password);

            if (user) {
                // Verificar se acesso expirou
                if (user.dataExpiracao) {
                    const expireDate = new Date(user.dataExpiracao);
                    if (new Date() > expireDate) {
                        showMessage(messageDiv, '❌ Seu acesso expirou em ' + expireDate.toLocaleDateString('pt-BR') + '. Entre em contato com o administrador.', 'error');
                        return;
                    }
                }

                // Verificar se está bloqueado
                if (user.status === 'bloqueado') {
                    showMessage(messageDiv, '❌ Sua conta foi bloqueada. Entre em contato com o administrador.', 'error');
                    return;
                }

                // Login bem-sucedido
                const result = auth.login(username, password);
                if (result.success) {
                    showMessage(messageDiv, '✅ ' + result.message, 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showMessage(messageDiv, '❌ ' + result.message, 'error');
                }
                return;
            }

            // Verificar usuários demo (se existirem)
            const demoUsers = JSON.parse(localStorage.getItem('demoUsers') || '[]');
            const demoUser = demoUsers.find(u => u.login === username && u.senha === password);

            if (demoUser) {
                // Usuários demo sempre têm acesso (para testes)
                const result = auth.login(username, password);
                if (result.success) {
                    showMessage(messageDiv, '✅ ' + result.message, 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showMessage(messageDiv, '❌ ' + result.message, 'error');
                }
                return;
            }

            showMessage(messageDiv, '❌ Usuário ou senha incorretos', 'error');
        }

        function showMessage(element, message, type) {
            element.textContent = message;
            element.className = 'message ' + type;
            element.style.display = 'block';
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginPassword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin();
            });

            if (auth.isLoggedIn()) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
