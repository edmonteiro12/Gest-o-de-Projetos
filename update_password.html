<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar Senha</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 400px; margin: auto; }
        label { display: block; margin-top: 10px; }
        input { width: 100%; padding: 8px; margin-top: 5px; }
        button { margin-top: 20px; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>Atualizar Login e Senha</h1>
    <form id="updateForm">
        <label for="novoLogin">Novo Login:</label>
        <input type="text" id="novoLogin" required>

        <label for="novaSenha">Nova Senha:</label>
        <input type="password" id="novaSenha" required>

        <button type="submit">Atualizar</button>
    </form>

    <script>
        // Verificar se usuário está logado
        const loggedUser = JSON.parse(localStorage.getItem('loggedUser'));
        if (!loggedUser) {
            window.location.href = 'login.html';
        }

        document.getElementById('updateForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const novoLogin = document.getElementById('novoLogin').value;
            const novaSenha = document.getElementById('novaSenha').value;

            let users = JSON.parse(localStorage.getItem('users')) || [];
            const userIndex = users.findIndex(u => u.login === loggedUser.login);
            if (userIndex !== -1) {
                // Verificar se novo login já existe (exceto o próprio)
                const existingUser = users.find(u => u.login === novoLogin && u.login !== loggedUser.login);
                if (existingUser) {
                    alert('Novo login já existe!');
                    return;
                }

                // Atualizar usuário
                users[userIndex].login = novoLogin;
                users[userIndex].senha = novaSenha;
                users[userIndex].senhaAtualizada = true;
                localStorage.setItem('users', JSON.stringify(users));

                // Atualizar loggedUser
                localStorage.setItem('loggedUser', JSON.stringify(users[userIndex]));

                alert('Login e senha atualizados com sucesso! Use as novas credenciais para entrar.');
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
